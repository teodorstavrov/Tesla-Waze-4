version: "3.9"

services:
  # ── PostgreSQL + PostGIS ────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    container_name: waze-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: waze
      POSTGRES_PASSWORD: waze_secret
      POSTGRES_DB: waze_police
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waze -d waze_police"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: waze-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Application ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: waze-police-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://waze:waze_secret@postgres:5432/waze_police
      REDIS_URL: redis://redis:6379
      PORT: 3001
      LOG_LEVEL: info
      LOG_PRETTY: "false"
      PLAYWRIGHT_HEADLESS: "true"
      # Override intervals for production if needed
      # INGEST_INTERVAL_MS: 7200000
      # EXPIRE_INTERVAL_MS: 900000
      # MARKER_TTL_MINUTES: 90
      # SESSION_TTL_SECONDS: 14400
      # API_SECRET: change_me_in_production
    ports:
      - "3001:3001"
    volumes:
      # Persist Playwright browser profile (optional performance boost)
      - playwright_cache:/root/.cache/ms-playwright
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  playwright_cache:
    driver: local
