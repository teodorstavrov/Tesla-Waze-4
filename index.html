      Tesla browser: disable user-scale to prevent accidental pinch-zoom while driving.
      Tesla uses a Chromium-based browser — maximum-scale=1 prevents text reflow.

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

         PRIMARY SEO
    ═══════════════════════════════════════════════════════════════════ -->
    <title>Tesla Radar — EV Charging Map & Road Events | Norway · Bulgaria · Scandinavia</title>

    <!-- EN description (broadest international reach) -->
    <meta name="description" content="Free real-time EV charging stations map and road events for Tesla drivers. Find Superchargers and charging points in Norway, Sweden, Denmark, Finland and Bulgaria. Speed cameras, police alerts, accident reports — all live on your Tesla screen." />

      Tesla Radar, Waze for Tesla, EV navigation app Tesla, speed camera alerts,
      route planner electric vehicle, charging station finder
    " />

    <!-- ═══════════════════════════════════════════════════════════════════
         STRUCTURED DATA — FAQPage (targets question-based searches EN + BG)
    ═══════════════════════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Where can I find EV charging stations in Norway on a map?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tesla Radar shows all EV charging stations in Norway in real-time, including Tesla Superchargers, Ionity, Recharge and other networks. The map is free and works directly in the Tesla browser at tesradar.tech."
          }
        },
        {
          "@type": "Question",
          "name": "Is there a Waze-like app for Tesla drivers?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — Tesla Radar works like Waze but for Tesla vehicles. It shows speed cameras, police presence, accidents, traffic, and road hazards in real-time. It also displays EV charging station availability. Works in Norway, Sweden, Denmark, Finland and Bulgaria."
          }
        },
        {
          "@type": "Question",
          "name": "Does Tesla Radar show speed cameras in Norway?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Tesla Radar shows speed camera locations, police checkpoints, accidents and other road events in Norway and Bulgaria. All events are reported by the community in real-time and expire automatically."
          }
        },
        {
          "@type": "Question",
          "name": "Which EV charging networks does Tesla Radar cover in Norway?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tesla Radar covers Tesla Superchargers, Ionity, Recharge, Mer, and all other networks via OpenChargeMap — over 10 000 charging points in Norway alone. Live availability status is shown where supported."
          }
        },
        {
          "@type": "Question",
          "name": "Кои зарядни станции за електромобили покрива Tesla Radar в България?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tesla Radar показва всички зарядни станции в България — Tesla Supercharger, EVN, EnCharge, EVPoint и всички останали мрежи чрез OpenChargeMap. Показва се и реалното статусче на наличните порта там, където е налично."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use Tesla Radar on my Tesla car screen?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Tesla Radar is specifically designed to work in the Tesla browser (built-in to all Tesla vehicles). Open tesradar.tech on your Tesla touchscreen and use it while driving."
          }
        },
        {
          "@type": "Question",
          "name": "How does the EV route planner in Tesla Radar work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Enter a destination and Tesla Radar will calculate the fastest route via OSRM. It shows remaining driving time, distance and estimates your battery charge at arrival based on your Tesla model and trim. Works in Norway and Bulgaria."
          }
        },
        {
          "@type": "Question",
          "name": "Hvordan finner jeg ledige ladestasjoner i Norge?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tesla Radar viser alle ladestasjoner i Norge i sanntid, inkludert Tesla Supercharger, Ionity og Recharge. Åpne tesradar.tech i Tesla-nettleseren for å se ledige ladepunkter på kartet."
          }
        }
      ]
    }
    </script>
