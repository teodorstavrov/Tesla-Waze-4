name: Waze Police Ingest

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: waze-police

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: waze-police/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('waze-police/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run ingestion
        run: npm run ingest
        env:
          DATABASE_URL: ${{ secrets.WAZE_DATABASE_URL }}
          REDIS_URL: ${{ secrets.WAZE_REDIS_URL }}
          NODE_ENV: production
          LOG_LEVEL: info
          LOG_PRETTY: 'true'
          PLAYWRIGHT_HEADLESS: 'true'
