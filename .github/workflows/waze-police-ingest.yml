name: Waze Police Ingest

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy

    defaults:
      run:
        working-directory: waze-police

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: waze-police/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ingestion
        run: npm run ingest
        env:
          DATABASE_URL: ${{ secrets.WAZE_DATABASE_URL }}
          REDIS_URL: ${{ secrets.WAZE_REDIS_URL }}
          NODE_ENV: production
          LOG_LEVEL: info
          LOG_PRETTY: 'true'
          PLAYWRIGHT_HEADLESS: 'true'
          WAZE_PROXY_URL: ${{ secrets.WAZE_PROXY_URL }}
